spring:
  application:
    name: checkdang

  datasource:
    # RDS 연결 정보: 엔드포인트는 유지하고 한글 인코딩 설정을 추가했습니다.
    url: ${RDS_URL:jdbc:mysql://checkdang-db.c168kuo8whz4.ap-northeast-2.rds.amazonaws.com:3306/checkdang?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI}

kakao:
  pay:
    secret-key: ${KAKAO_PAY_SECRET_KEY}
    cid: ${KAKAO_PAY_CID:TC0ONETIME}
    approval-url: ${KAKAO_PAY_APPROVAL_URL}
    cancel-url: ${KAKAO_PAY_CANCEL_URL}
    fail-url: ${KAKAO_PAY_FAIL_URL}
    premium-price: ${KAKAO_PAY_PREMIUM_PRICE:9900}

aws:
  region: ${AWS_REGION}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
  dynamodb:
    endpoint: ${DYNAMODB_ENDPOINT:}
    table-name: users
    refresh-token-table-name: refresh_tokens
    blood-sugar-table-name: blood_glucose_record
    payment-table-name: payment_records

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health